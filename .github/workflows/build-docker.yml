name: Build Docker Images

on:
  push:
    branches: [master, main]
    paths:
      - 'orchestration-os-merged/dockers/**'
      - '.github/workflows/build-docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/zo-orchestration-os

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        runtime: [python, nodejs, deno, bun, ruby, go, rust, bash]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            orchestration-os-merged/dockers
            .github/workflows/build-docker.yml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./orchestration-os-merged/dockers/${{ matrix.runtime }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.runtime }}:latest
            ${{ env.IMAGE_NAME }}/${{ matrix.runtime }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

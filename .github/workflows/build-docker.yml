name: Build Docker Images

on:
  push:
    branches: [main]
    paths:
      - 'dockers/**'
      - '.github/workflows/build-docker.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: zo-orchestration-os

jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        runtime: [python, nodejs, deno, bun, ruby, go, rust, bash]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Debug context
        run: |
          echo 'Runtime: ${{ matrix.runtime }}'
          ls -la dockers/${{ matrix.runtime }}/
          cat dockers/${{ matrix.runtime }}/Dockerfile
      - name: Build and push
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]' | tr '-' '--')
          docker build -t test:runtime dockers/${{ matrix.runtime }}/
          docker tag test:runtime ghcr.io/${REPO}/${{ matrix.runtime }}:latest
          docker tag test:runtime ghcr.io/${REPO}/${{ matrix.runtime }}:${{ github.sha }}
          docker push ghcr.io/${REPO}/${{ matrix.runtime }}:latest

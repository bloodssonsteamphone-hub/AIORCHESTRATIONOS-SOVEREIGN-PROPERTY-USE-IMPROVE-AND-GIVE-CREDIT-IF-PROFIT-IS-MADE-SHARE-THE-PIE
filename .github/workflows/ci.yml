name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit || echo "No TypeScript config"

      - name: Build
        run: npm run build || echo "No build script"

  docker-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test Python container
        run: docker build -f dockers/python/Dockerfile dockers/python/ --quiet || echo "Docker not available"

      - name: Test Node.js container
        run: docker build -f dockers/nodejs/Dockerfile dockers/nodejs/ --quiet || echo "Docker not available"
